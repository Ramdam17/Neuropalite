<!-- Muse Status Cards — one per participant -->

<div class="card glass-card muse-card" id="muse-card-1">
    <h3 class="card-title">MUSE 1 — <span class="participant-a">Participant A</span></h3>
    <div class="muse-info">
        <div class="status-row">
            <span class="label">Status:</span>
            <span class="status-dot disconnected" id="muse1-dot"></span>
            <span class="status-text" id="muse1-status">Disconnected</span>
        </div>
        <div class="status-row">
            <span class="label">Battery:</span>
            <span class="mono" id="muse1-battery">—</span>
        </div>
        <div class="status-row">
            <span class="label">Signal:</span>
            <div class="signal-bars" id="muse1-signal">
                <span class="bar"></span><span class="bar"></span>
                <span class="bar"></span><span class="bar"></span>
            </div>
        </div>
    </div>
</div>

        <div class="status-row">

        </div>
        <div class="status-row">

                <span class="bar"></span><span class="bar"></span>
                <span class="bar"></span><span class="bar"></span>
            </div>
        </div>
    </div>
</div>
