# config/muse_config.yaml
# Neuropalite — Muse device configuration
#
# Replace bluetooth_address values with your actual Muse S addresses.
# Find them via: muse-lsl list

muse_devices:
  muse_1:
    name: "Participant A"
    bluetooth_address: "00:55:DA:B0:XX:XX"  # Replace with actual address
    enabled: true
    color: "#FF6B9D"

  muse_2:
    name: "Participant B"
    bluetooth_address: "00:55:DA:B0:XX:XX"  # Replace with actual address
    enabled: true
    color: "#FF8C42"

acquisition:
  sampling_rate: 256       # Hz — standard Muse S rate
  channels:
    - "TP9"
    - "AF7"
    - "AF8"
    - "TP10"
  buffer_duration: 10      # seconds — circular buffer window
  auto_reconnect: true
  reconnect_delay: 5       # seconds between reconnect attempts
  max_reconnect_attempts: 10
